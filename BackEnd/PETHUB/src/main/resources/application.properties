# ===============================
# PostgreSQL Database Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/pethub
spring.datasource.username=postgres
spring.datasource.password=Anu@4395
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Dev-only credentials to avoid generated default password warning
spring.security.user.name=dev
spring.security.user.password=dev123

# Seeded admin account for Admin web login
app.admin.username=Anupa
app.admin.password=Anupa123

# ===============================
# Logging (Debug SQL + API calls)
# ===============================
# Show SQL queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Show Spring Web requests (GET, POST, etc.)
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# ===============================
# Server Configuration
# ===============================
# Allow external devices (your phone) to access backend
server.address=0.0.0.0
server.port=8080

# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload folder path (absolute path is better)
file.upload-dir=uploads